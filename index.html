<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>単語日記</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="wrap">
    <h1>単語日記</h1>
    <p class="muted">単語を 3 / 5 / 7 個入れて日記を書く</p>
  </header>

  <main class="wrap grid">
    <section class="card">
      <h2>1) 単語数を選ぶ</h2>

      <div class="row">
        <label class="muted small">単語数</label>
        <select id="wordCount">
          <option value="3">3</option>
          <option value="5">5</option>
          <option value="7">7</option>
        </select>

        <button id="btnDraftSave" class="secondary">下書き保存</button>
        <button id="btnDraftLoad" class="secondary">下書き復元</button>
        <button id="btnDraftClear" class="secondary">下書き削除</button>
      </div>

      <div id="wordsArea" class="words"></div>

      <div class="row">
        <button id="btnGenerate">日記を作る</button>
        <button id="btnCopy" class="secondary" disabled>コピー</button>
        <button id="btnSpeak" class="secondary" disabled>読み上げ</button>
        <button id="btnStop" class="secondary" disabled>停止</button>
      </div>

      <label class="muted small">生成結果</label>
      <textarea id="result" rows="10" placeholder="ここに日記が出ます"></textarea>

      <p id="status" class="muted small"></p>
    </section>

    <section class="card howto">
  <h2>2) 使い方</h2>
  <ol>
    <li>単語数（3 / 5 / 7）を選ぶ</li>
    <li>単語を入力</li>
    <li>「日記を作る」を押す</li>
    <li>コピー・読み上げが利用できる</li>
  </ol>
</section>


    <section class="card">
      <h2>2) 使い方</h2>
      <ol class="muted small">
        <li>単語数（3 / 5 / 7）を選ぶ</li>
        <li>単語を入力</li>
        <li>「日記を作る」を押す</li>
        <li>コピー・読み上げが利用できる</li>
      </ol>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
